services:
  # Runs on all nodes - checks consistency, provides internal API
  syncwatch:
    image: suitdeer/syncwatch:latest
    deploy:
      mode: global
      endpoint_mode: dnsrr
    environment:
      - DATA_PATH=/data
      - SERVICE_NAME=syncwatch
      - DASHBOARD_MODE=false
    volumes:
      - /var/syncthing/data:/data
    networks:
      - syncwatch-net

  # Runs on ONE node (web dashboard)
  dashboard:
    image: suitdeer/syncwatch:latest
    ports:
      - "8081:8080"
    environment:
      - DATA_PATH=/data
      - SERVICE_NAME=syncwatch
      - DASHBOARD_MODE=true
    volumes:
      - /var/syncthing/data:/data
    networks:
      - syncwatch-net

networks:
  syncwatch-net:
    driver: overlay